services:
  trino:
    image: trinodb/trino:481
    container_name: trino
    user: root
    restart: unless-stopped

    env_file:
      - ./envs/postgre.env
      - ./envs/minio.env

    ports:
      - "8082:8080"

    networks:
      - data_network

    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties:ro
      - ./trino/etc/node.properties:/etc/trino/node.properties:ro
      - ./trino/etc/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/etc/log.properties:/etc/trino/log.properties:ro
      - ./trino/entrypoint.sh:/usr/local/bin/agent4da-trino-entrypoint.sh:ro

    entrypoint: ["/bin/sh", "/usr/local/bin/agent4da-trino-entrypoint.sh"]

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/v1/info >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

networks:
  data_network:
    external: true
    name: data_network
