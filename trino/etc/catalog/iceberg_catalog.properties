connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=iceberg_catalog
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=${ENV:TRINO_ICEBERG_JDBC_URI}
iceberg.jdbc-catalog.connection-user=${ENV:POSTGRES_USER}
iceberg.jdbc-catalog.connection-password=${ENV:POSTGRES_PASSWORD}
iceberg.jdbc-catalog.default-warehouse-dir=${ENV:ICEBERG_WAREHOUSE}

fs.s3.enabled=true
s3.endpoint=${ENV:MINIO_ENDPOINT}
s3.aws-access-key=${ENV:MINIO_ACCESS_KEY}
s3.aws-secret-key=${ENV:MINIO_SECRET_KEY}
s3.path-style-access=true
s3.region=us-east-1
