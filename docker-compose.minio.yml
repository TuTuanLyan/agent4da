services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    env_file:
      - ./envs/minio.env
    volumes:
      # Named volume — Docker quản lý, không nằm lẫn vào project tree.
      # Production: dùng named volume hoặc bind mount ra /data/minio (ngoài project).
      # Để xem data ở đâu: docker volume inspect <project>_minio_data
      # Để backup:         docker run --rm -v <project>_minio_data:/data -v $(pwd):/out alpine tar czf /out/minio_backup.tar.gz /data
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API — Spark kết nối vào đây
      - "9001:9001"   # Console UI — http://localhost:9001
    restart: unless-stopped
    networks:
      - data_network  # Cùng network với Spark/Kafka — dùng http://minio:9000 nội bộ

networks:
  data_network:
    external: true
    name: data_network

volumes:
  minio_data:
    # Docker-managed volume. Dữ liệu tồn tại kể cả khi container bị xóa.
    # Chỉ mất khi chạy: docker volume rm <project>_minio_data
