services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: bigdata
      POSTGRES_PASSWORD: '#3Bigdata'
      POSTGRES_DB: agent4da
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    
    networks:
      - internal_network
    
    ports:
      - "5432:5432"

    security_opt:
      - apparmor=unconfined

volumes:
  postgres_data:
    driver: local

networks:
  internal_network:
    driver: bridge
